# Builds TrueforceForAll-Setup.exe and uploads it to a draft GitHub release.
#
# Triggers:
#   - push of a `v*` tag (e.g. v0.1.0)  â†’ release named after the tag
#   - manual run via the Actions UI     â†’ builds artifacts only, no release
#
# Inno Setup 6 is preinstalled on GitHub's windows-latest images at
#   C:\Program Files (x86)\Inno Setup 6\iscc.exe
# (see https://github.com/actions/runner-images for the current toolset list).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release to create the release

jobs:
  build-installer:
    runs-on: windows-latest

    env:
      USBPCAP_VERSION: 1.5.4.0
      USBPCAP_URL: https://github.com/desowin/usbpcap/releases/download/1.5.4.0/USBPcapSetup-1.5.4.0.exe
      # SHA-256 of USBPcapSetup-1.5.4.0.exe published on 2020-05-22, captured on
      # 2026-05-04. If upstream republishes under the same URL, the build fails
      # loudly rather than silently bundling unverified bytes.
      USBPCAP_SHA256: 87A7EDF9BBBCF07B5F4373D9A192A6770D2FF3ADD7AA1E276E82E38582CCB622

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $version = $ref -replace '^refs/tags/v',''
          } else {
            $version = "0.0.0-$(Get-Date -Format yyyyMMddHHmm)-${{ github.run_number }}"
          }
          Write-Host "Version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build plugin (net48, Release)
        shell: pwsh
        run: dotnet build src\TrueforceForAll.Plugin\TrueforceForAll.Plugin.csproj -c Release --nologo

      - name: Publish loopback helper (net8 single-file, win-x64)
        shell: pwsh
        run: dotnet publish src\TrueforceForAll.LoopbackHelper\TrueforceForAll.LoopbackHelper.csproj -c Release -r win-x64 --nologo

      - name: Download bundled USBPcap installer
        shell: pwsh
        run: |
          $dest = "installer\vendor\USBPcapSetup.exe"
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Invoke-WebRequest -Uri "$env:USBPCAP_URL" -OutFile $dest -UseBasicParsing
          $sha = (Get-FileHash $dest -Algorithm SHA256).Hash
          if ($sha -ne $env:USBPCAP_SHA256) {
            throw "USBPcap SHA256 mismatch: expected $env:USBPCAP_SHA256, got $sha"
          }
          Write-Host "USBPcap $env:USBPCAP_VERSION verified (SHA256=$sha)"

      - name: Compile Inno Setup script
        shell: pwsh
        env:
          TRUEFORCEFORALL_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup 6 not found at $iscc â€” runner image may have changed."
          }
          & $iscc installer\TrueforceForAll.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Upload setup.exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueforceForAll-Setup
          path: installer/output/TrueforceForAll-Setup.exe
          if-no-files-found: error

      - name: Publish draft GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Trueforce For All ${{ github.ref_name }}
          files: installer/output/TrueforceForAll-Setup.exe
          generate_release_notes: true
